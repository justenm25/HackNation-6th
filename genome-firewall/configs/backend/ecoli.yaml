species:
  id: escherichia_coli
  display_name: Escherichia coli
  amrfinder_organism: Escherichia
drug_panel:
  - id: ciprofloxacin
    display_name: Ciprofloxacin
    enabled: true
  - id: ceftriaxone
    display_name: Ceftriaxone
    enabled: true
  - id: gentamicin
    display_name: Gentamicin
    enabled: true
  - id: ampicillin
    display_name: Ampicillin
    enabled: true
features:
  schema_version: gf-amr-v1
grouping:
  prefer_supplied_groups: true
  fallback_tool: mash
  mash_kmer_size: 21
  mash_sketch_size: 10000
  distance_threshold: 0.001
labels:
  resistant_values: [Resistant]
  susceptible_values: [Susceptible]
  intermediate_values: [Intermediate]
  intermediate_policy: exclude
calibration:
  method: sigmoid
  isotonic_min_samples: 500
calling:
  resistant_threshold: 0.8
  susceptible_threshold: 0.1
  marker_free_susceptible_policy: conservative
